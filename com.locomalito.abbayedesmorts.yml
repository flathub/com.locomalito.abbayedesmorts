app-id: com.locomalito.abbayedesmorts
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: abbayev2
rename-desktop-file: abbaye.desktop
rename-icon: abbaye
finish-args:
  - --device=dri
  - --share=ipc
  - --socket=pulseaudio
  - --socket=wayland
  - --socket=fallback-x11
modules:
  - shared-modules/SDL2/SDL2_image.json
  - name: abbayedesmorts
    buildsystem: simple
    build-commands:
      - make PREFIX=${FLATPAK_DEST}
      - make install PREFIX=${FLATPAK_DEST}
    post-install:
      - install -Dm0644 abbaye.svg -t ${FLATPAK_DEST}/share/icons/hicolor/scalable/apps/
      - install -Dm0644 ${FLATPAK_ID}.metainfo.xml -t ${FLATPAK_DEST}/share/metainfo/
    cleanup:
      - /share/appdata
    sources:
      - type: git
        url: https://github.com/nevat/abbayedesmorts-gpl.git
        tag: v2.0.4
        commit: f1b70474fbc5f343e2196d1f85a79991a4a313d0
        x-checker-data:
          is-main-source: true
          type: git
          tag-pattern: ^v([\\d.]+)$
      - type: file
        path: abbaye.svg
      - type: file
        path: com.locomalito.abbayedesmorts.metainfo.xml
